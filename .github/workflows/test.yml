name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux jq bats

          # Install yq
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          # Install fzf
          FZF_VERSION=$(curl -s https://api.github.com/repos/junegunn/fzf/releases/latest | jq -r '.tag_name // "v0.56.0"')
          curl -Lo /tmp/fzf.tar.gz "https://github.com/junegunn/fzf/releases/download/${FZF_VERSION}/fzf-${FZF_VERSION#v}-linux_amd64.tar.gz"
          sudo tar -xzf /tmp/fzf.tar.gz -C /usr/local/bin/

          # Install neovim
          curl -Lo /tmp/nvim.tar.gz https://github.com/neovim/neovim/releases/latest/download/nvim-linux-x86_64.tar.gz
          sudo tar -xzf /tmp/nvim.tar.gz -C /opt/
          sudo ln -sf /opt/nvim-linux-x86_64/bin/nvim /usr/local/bin/nvim

      - name: Verify dependencies
        run: |
          tmux -V
          jq --version
          yq --version
          fzf --version
          nvim --version | head -1
          bats --version

      - name: Run core test suite
        run: bash tests/test_restore_stack.sh all

      - name: Run template test suite
        run: bats tests/templates.bats
